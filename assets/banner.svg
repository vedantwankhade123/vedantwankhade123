<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <!-- Ultra subtle light gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    
    <!-- Minimalist pastel gradient orb -->
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f3e8ff" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdf4ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.8" />
    </linearGradient>

    <!-- Refined Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="800" height="250" rx="12" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1" />
  
  <!-- Subtle Glowing Orbs -->
  <circle cx="150" cy="50" r="140" fill="url(#orb1)" filter="url(#blur)" />
  <circle cx="650" cy="200" r="160" fill="url(#orb2)" filter="url(#blur)" />

  <!-- Clean Minimalist Grid Lines -->
  <g opacity="0.04" stroke="#0f172a" stroke-width="1">
    <!-- Horizontal -->
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <!-- Vertical -->
    <line x1="100" y1="0" x2="100" y2="250" />
    <line x1="200" y1="0" x2="200" y2="250" />
    <line x1="600" y1="0" x2="600" y2="250" />
    <line x1="700" y1="0" x2="700" y2="250" />
  </g>

  <!-- Name (Minimalist, Light Weight, High Tracking) -->
  <text x="404" y="125" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="300" font-size="44" fill="url(#textGrad)" text-anchor="middle" letter-spacing="8">VEDANT WANKHADE</text>
  
  <!-- Role (Minimalist, Medium Weight) -->
  <text x="402" y="170" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="500" font-size="15" fill="#64748b" text-anchor="middle" letter-spacing="4">FULL STACK DEVELOPER</text>
  
  <!-- Subtle accent line -->
  <rect x="385" y="195" width="30" height="2" fill="#cbd5e1" rx="1" />
</svg>
