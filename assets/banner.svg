<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="300" rx="20" fill="url(#bg)" />
  
  <!-- Decorative grid background -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
  </pattern>
  <rect width="800" height="300" fill="url(#grid)" rx="20" />

  <!-- Abstract developer shapes -->
  <circle cx="700" cy="50" r="100" fill="#38bdf8" opacity="0.15" filter="url(#glow)"/>
  <circle cx="100" cy="250" r="80" fill="#818cf8" opacity="0.15" filter="url(#glow)"/>
  
  <path d="M 620 200 L 670 250 L 570 250 Z" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.2" filter="url(#glow)" />
  <rect x="120" y="60" width="40" height="40" rx="8" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.2" transform="rotate(25 140 80)" filter="url(#glow)" />
  
  <!-- Code bracket graphics -->
  <text x="50" y="150" font-family="'Fira Code', monospace" font-weight="800" font-size="80" fill="#ffffff" opacity="0.03">&lt;</text>
  <text x="700" y="220" font-family="'Fira Code', monospace" font-weight="800" font-size="80" fill="#ffffff" opacity="0.03">/&gt;</text>

  <!-- Main text -->
  <text x="400" y="140" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="46" fill="#ffffff" text-anchor="middle" letter-spacing="3">VEDANT WANKHADE</text>
  
  <text x="400" y="185" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600" font-size="22" fill="url(#textGrad)" text-anchor="middle" letter-spacing="1">Full-Stack Developer &amp; AI Enthusiast</text>
  
  <!-- Minimalist bottom bar -->
  <rect x="360" y="220" width="80" height="4" rx="2" fill="url(#textGrad)" />
</svg>
